# Alembic configuration — FitBuddy backend
# Run from the `backend/` directory:
#   alembic upgrade head
#   alembic revision --autogenerate -m "describe change"

[alembic]
script_location = alembic
prepend_sys_path = .

# database_url is injected in alembic/env.py from app.core.config (reads .env).
# Do NOT put the real URL here — it would be committed to git.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
