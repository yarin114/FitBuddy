name: fitbuddy
description: FitBuddy — AI-powered nutrition coaching app.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # ── State management ──────────────────────────────────────────────────────
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # ── Immutable state / data classes ───────────────────────────────────────
  freezed_annotation: ^2.4.4

  # ── Navigation ────────────────────────────────────────────────────────────
  go_router: ^14.6.1

  # ── Networking ────────────────────────────────────────────────────────────
  dio: ^5.7.0

  # ── Firebase ─────────────────────────────────────────────────────────────
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  firebase_messaging: ^15.1.5

  # ── Storage ───────────────────────────────────────────────────────────────
  shared_preferences: ^2.3.4

  # ── Utilities ─────────────────────────────────────────────────────────────
  web_socket_channel: ^3.0.1
  intl: ^0.19.0
  logger: ^2.5.0
  json_annotation: ^4.9.0

  # ── Pantry / Smart Kitchen ────────────────────────────────────────────────
  image_picker: ^1.1.2        # receipt photo — returns XFile (v1.x API)
  uuid: ^4.5.1                # deterministic PantryItem IDs

dev_dependencies:
  flutter_test:
    sdk: flutter

  # ── Code generation ───────────────────────────────────────────────────────
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1
  freezed: ^2.5.7
  json_serializable: ^6.8.0

  # ── Linting ───────────────────────────────────────────────────────────────
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # ── Fonts ──────────────────────────────────────────────────────────────────
  # Inter TTF files are not yet committed. To enable:
  #   1. Download Inter from https://fonts.google.com/specimen/Inter
  #   2. Place the 5 weights in mobile/assets/fonts/
  #   3. Uncomment the block below and re-run flutter pub get
  #
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #         weight: 400
  #       - asset: assets/fonts/Inter-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Inter-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Inter-Bold.ttf
  #         weight: 700
  #       - asset: assets/fonts/Inter-ExtraBold.ttf
  #         weight: 800

  assets:
    - assets/images/
    - assets/icons/
